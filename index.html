<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Manager — לוח בקרה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo','Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:960px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1e293b,#334155);border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #475569}
.header h1{font-size:22px;font-weight:900;color:#f8fafc}
.header p{color:#94a3b8;font-size:13px;margin-top:6px}
.sync-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#1e293b;border-radius:10px;margin-bottom:16px;font-size:11px;border:1px solid #334155}
.sync-status{display:flex;align-items:center;gap:6px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync-dot.ok{background:#10b981}
.sync-dot.err{background:#ef4444}
.sync-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:#1e293b;border-radius:10px;padding:12px 8px;text-align:center}
.stat-val{font-size:20px;font-weight:700}
.stat-lbl{font-size:11px;color:#94a3b8;margin-top:2px}
.progress-wrap{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:16px}
.progress-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.progress-bar{background:#334155;border-radius:6px;height:10px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#10b981,#06b6d4);height:100%;border-radius:6px;transition:width .3s}
.hours-section{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid #334155}
.hours-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hours-header h2{font-size:16px;font-weight:700;color:#06b6d4}
.btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit}
.btn-cyan{background:#06b6d4;color:#0f172a}
.btn-green{background:#10b981;color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.hours-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.form-group label{font-size:10px;color:#94a3b8;display:block;margin-bottom:3px}
.form-group input,.form-group select{width:100%;background:#0f172a;border:1px solid #475569;border-radius:6px;padding:7px;color:#e2e8f0;font-size:12px;font-family:inherit}
.hours-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.hours-table th{text-align:right;padding:5px;color:#94a3b8;border-bottom:1px solid #334155}
.hours-table td{padding:5px}
.hours-summary{display:flex;gap:12px;font-size:12px;margin-top:10px;padding-top:10px;border-top:1px solid #334155;flex-wrap:wrap}
.controls{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.search{flex:1;min-width:140px;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#e2e8f0;font-size:13px;font-family:inherit}
.filter-btn{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:12px;font-family:inherit}
.filter-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.category{margin-bottom:12px;background:#1e293b;border-radius:10px;overflow:hidden;border:1px solid #334155}
.cat-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer}
.cat-header .info{display:flex;align-items:center;gap:8px}
.cat-header .arrow{font-size:11px;transition:transform .2s}
.cat-header .name{font-weight:700;font-size:14px}
.cat-header .count{font-size:11px;color:#64748b;background:#0f172a;border-radius:10px;padding:2px 8px}
.cat-progress{display:flex;align-items:center;gap:6px}
.cat-bar{width:60px;height:5px;background:#334155;border-radius:3px;overflow:hidden}
.cat-fill{height:100%;border-radius:3px}
.cat-pct{font-size:11px;color:#94a3b8;min-width:28px;text-align:left}
.task-list{padding:0 14px 10px}
.task{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid #0f172a}
.task input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.task-text{flex:1;font-size:12px}
.task-text.done{text-decoration:line-through;color:#475569}
.badge{font-size:9px;border-radius:3px;padding:1px 5px;margin-right:4px;white-space:nowrap}
.badge-green{background:#10b981;color:#fff}
.badge-orange{background:#f97316;color:#fff}
.footer{text-align:center;padding:16px 0;color:#475569;font-size:11px}
.setup-box{background:#1e293b;border:2px dashed #f59e0b;border-radius:12px;padding:20px;margin-bottom:16px;text-align:center}
.setup-box h3{color:#f59e0b;margin-bottom:8px}
.setup-box input{width:100%;background:#0f172a;border:1px solid #475569;border-radius:6px;padding:8px;color:#e2e8f0;font-size:12px;margin:6px 0;font-family:inherit;direction:ltr}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .hours-form{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ============ CONFIG ============
// User sets these once — stored in localStorage
const CFG_KEY = 'manager-config';
const HOURS_KEY = 'manager-work-hours-v2';
const CACHE_KEY = 'manager-sheet-cache';

// ===== HARDCODED SHEET CONFIG =====
const DEFAULT_SHEET_ID = '16xVG6xHsrilXv5I1n-jPS49ka5Dz9Cr1f1e8PDZB2SA';
const DEFAULT_GID = '1985634719';
const DEFAULT_PUB_KEY = '2PACX-1vTV8NzgFdxt_mjW1MzZMVCX0CHuKkjYwQsc6j8IswgO2l8K_nAYUkzDPtMIOdHZEQxZkxiHoM7cK3gU';

const CAT_COLORS = {
  'מיידי':'#ef4444','באגים':'#f97316',"פיצ'רים עמר":'#8b5cf6',
  "פיצ'רים יובל לי":'#3b82f6','טווח קרוב':'#06b6d4','טווח רחוק':'#64748b',
  'Production':'#10b981','n8n אימות':'#d946ef'
};

let config = null;
let state = { tasks: {}, hours: [], filter: 'all', search: '', collapsed: {}, showHoursForm: false, showSetup: false, syncStatus: 'loading', syncError: '', lastSync: null };

function loadConfig() {
  try { config = JSON.parse(localStorage.getItem(CFG_KEY)); } catch {}
  // Auto-set defaults if no config
  if (!config || !config.sheetId) {
    config = { sheetId: DEFAULT_SHEET_ID, gid: DEFAULT_GID, pubKey: DEFAULT_PUB_KEY, sheetName: '', webhookUrl: '' };
    saveConfig();
  }
  // Ensure gid and pubKey exist on old configs
  if (!config.gid || !config.pubKey) {
    config.gid = config.gid || DEFAULT_GID;
    config.pubKey = config.pubKey || DEFAULT_PUB_KEY;
    saveConfig();
  }
}
function saveConfig() {
  try { localStorage.setItem(CFG_KEY, JSON.stringify(config)); } catch {}
}
function loadHours() {
  try { state.hours = JSON.parse(localStorage.getItem(HOURS_KEY)) || []; } catch { state.hours = []; }
}
function saveHours() {
  try { localStorage.setItem(HOURS_KEY, JSON.stringify(state.hours)); } catch {}
}
function cacheSheet(tasks) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ tasks, ts: Date.now() })); } catch {}
}
function loadCache() {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (c && c.tasks) { state.tasks = c.tasks; state.lastSync = c.ts; return true; }
  } catch {}
  return false;
}

// ============ CSV PARSER ============
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  });
}

function csvToTasks(rows) {
  const cats = {};
  for (const r of rows) {
    const cat = r.category || 'אחר';
    if (!cats[cat]) cats[cat] = { color: CAT_COLORS[cat] || '#64748b', tasks: [] };
    cats[cat].tasks.push({
      id: parseInt(r.id) || Math.random() * 99999 | 0,
      text: r.task || '',
      done: String(r.done).toUpperCase() === 'TRUE',
      v: String(r.verified_in_code).toUpperCase() === 'TRUE',
      n: r.note || '',
      est: parseFloat(r.est_hours) || 0,
      priority: parseInt(r.priority) || 9
    });
  }
  return cats;
}

// ============ FETCH FROM GOOGLE SHEET ============
async function fetchSheet() {
  if (!config || !config.sheetId) return false;
  state.syncStatus = 'loading';
  state.syncError = '';
  render();

  // Try multiple URL formats — published URL first (most reliable for CORS)
  const pubKey = config.pubKey || DEFAULT_PUB_KEY;
  const gid = config.gid || DEFAULT_GID;
  const urls = [];
  // 1. Published CSV (best — no auth needed, CORS friendly)
  if (pubKey) {
    urls.push(`https://docs.google.com/spreadsheets/d/e/${pubKey}/pub?gid=${gid}&single=true&output=csv`);
  }
  // 2. gviz fallback
  if (config.gid) {
    urls.push(`https://docs.google.com/spreadsheets/d/${config.sheetId}/gviz/tq?tqx=out:csv&gid=${config.gid}`);
  }
  urls.push(`https://docs.google.com/spreadsheets/d/${config.sheetId}/gviz/tq?tqx=out:csv`);

  for (const url of urls) {
    try {
      console.log('Trying:', url);
      const resp = await fetch(url);
      if (!resp.ok) { console.warn('HTTP ' + resp.status, url); continue; }
      const text = await resp.text();
      // gviz might return JSON error instead of CSV
      if (text.startsWith('google.visualization') || text.startsWith('{')) {
        console.warn('Got gviz JSON response, not CSV:', text.substring(0, 200));
        continue;
      }
      const rows = parseCSV(text);
      if (rows.length === 0) { console.warn('Empty CSV from', url); continue; }
      // Verify we got real columns
      const firstRow = rows[0];
      if (!firstRow.task && !firstRow.category && !firstRow.id) {
        console.warn('CSV missing expected columns. Got:', Object.keys(firstRow).join(', '));
        continue;
      }
      state.tasks = csvToTasks(rows);
      state.syncStatus = 'ok';
      state.syncError = '';
      state.lastSync = Date.now();
      cacheSheet(state.tasks);
      render();
      return true;
    } catch (e) {
      console.warn('Fetch failed:', url, e.message);
    }
  }

  state.syncStatus = 'err';
  state.syncError = 'לא הצלחתי לקרוא מהשיטס. בדוק שהשיטס מפורסם (Publish to web) ושה-Sheet ID נכון.';
  render();
  return false;
}

// ============ WRITE BACK VIA N8N WEBHOOK ============
async function updateTaskInSheet(id, done) {
  if (!config || !config.webhookUrl) return;
  try {
    await fetch(config.webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'toggle', id, done, ts: new Date().toISOString() })
    });
  } catch (e) {
    console.warn('Webhook failed:', e);
  }
}

// ============ RENDER ============
function render() {
  const app = document.getElementById('app');

  // Setup screen if no config or explicitly showing setup
  if (state.showSetup || !config || !config.sheetId) {
    app.innerHTML = `
    <div class="header"><h1>Manager App — לוח בקרה</h1><p>הגדרה ראשונית</p></div>
    <div class="setup-box">
      <h3>חיבור ל-Google Sheet</h3>
      <p style="color:#94a3b8;font-size:12px;margin-bottom:12px">
        1. ייבא את ה-CSV לשיטס חדש<br>
        2. File → Share → Publish to web → CSV<br>
        3. העתק את ה-Sheet ID מה-URL
      </p>
      <input id="cfg-sheet" placeholder="Sheet ID (מה-URL: /d/XXXXXX/edit)" value="${config?.sheetId || ''}">
      <input id="cfg-gid" placeholder="GID של הגיליון (מה-URL: #gid=XXXX)" value="${config?.gid || ''}" style="direction:ltr">
      <input id="cfg-webhook" placeholder="n8n webhook URL לעדכון (אופציונלי)" value="${config?.webhookUrl || ''}">
      <br><button class="btn btn-green" onclick="saveSetup()" style="margin-top:8px;width:100%">שמור והתחבר</button>
    </div>`;
    return;
  }

  const allTasks = Object.values(state.tasks).flatMap(c => c.tasks);
  const total = allTasks.length, done = allTasks.filter(t => t.done).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const totalHours = state.hours.reduce((s, e) => s + (parseFloat(e.hours) || 0), 0);
  const daysWorked = new Set(state.hours.map(e => e.date)).size;
  const deadline = new Date('2026-03-31'), today = new Date();
  const daysLeft = Math.max(0, Math.ceil((deadline - today) / 864e5));
  const remaining = total - done;
  const pace = daysLeft > 0 ? (remaining / daysLeft).toFixed(1) : '∞';
  const syncTime = state.lastSync ? new Date(state.lastSync).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }) : '---';
  const syncClass = state.syncStatus;

  let h = `
<div class="header">
  <h1>Manager App — לוח בקרה</h1>
  <p>דדליין: 31.03.2026 | ${daysLeft} ימים נותרו</p>
</div>
<div class="sync-bar">
  <div class="sync-status"><span class="sync-dot ${syncClass}"></span> ${syncClass === 'ok' ? 'מסונכרן' : syncClass === 'loading' ? 'טוען...' : 'שגיאת סנכרון'} | ${syncTime}</div>
  <button class="btn btn-cyan btn-sm" onclick="fetchSheet()">רענן</button>
</div>
${state.syncError ? `<div style="background:#451a03;border:1px solid #f97316;border-radius:8px;padding:10px;margin-bottom:16px;font-size:12px;color:#fed7aa">${state.syncError}<br><span style="color:#94a3b8;font-size:10px;direction:ltr;display:block;margin-top:4px">Sheet ID: ${config?.sheetId || '?'} | GID: ${config?.gid || 'none'}</span></div>` : ''}
<div class="stats">
  <div class="stat" style="border-right:3px solid #3b82f6"><div class="stat-val" style="color:#3b82f6">${total}</div><div class="stat-lbl">סה״כ</div></div>
  <div class="stat" style="border-right:3px solid #10b981"><div class="stat-val" style="color:#10b981">${done} (${pct}%)</div><div class="stat-lbl">הושלמו</div></div>
  <div class="stat" style="border-right:3px solid #f97316"><div class="stat-val" style="color:#f97316">${remaining}</div><div class="stat-lbl">נותרו</div></div>
  <div class="stat" style="border-right:3px solid #d946ef"><div class="stat-val" style="color:#d946ef">${pace}/יום</div><div class="stat-lbl">קצב נדרש</div></div>
  <div class="stat" style="border-right:3px solid #06b6d4"><div class="stat-val" style="color:#06b6d4">${totalHours.toFixed(1)}</div><div class="stat-lbl">שעות עבודה</div></div>
  <div class="stat" style="border-right:3px solid #8b5cf6"><div class="stat-val" style="color:#8b5cf6">${daysWorked}</div><div class="stat-lbl">ימים</div></div>
</div>
<div class="progress-wrap">
  <div class="progress-header"><span>התקדמות כללית</span><span style="color:#10b981;font-weight:700">${pct}%</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>`;

  // Work hours
  h += `<div class="hours-section">
  <div class="hours-header"><h2>שעות עבודה</h2><button class="btn btn-cyan" onclick="toggleHoursForm()">${state.showHoursForm ? 'ביטול' : '+ שעות'}</button></div>`;
  if (state.showHoursForm) {
    h += `<div class="hours-form">
    <div class="form-group"><label>תאריך</label><input type="date" id="h-date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="form-group"><label>שעות</label><input type="number" id="h-hours" step="0.5" min="0" max="16" placeholder="3.5" style="direction:ltr"></div>
    <div class="form-group"><label>מיקום</label><select id="h-loc"><option>בית</option><option>משרד</option><option>שטח</option></select></div>
    <div class="form-group"><label>הערות</label><input type="text" id="h-notes" placeholder="מה עבדת עליו..."></div>
    </div><button class="btn btn-green" onclick="addHours()" style="width:100%;margin-bottom:8px">שמור</button>`;
  }
  if (state.hours.length > 0) {
    h += `<div style="max-height:180px;overflow-y:auto"><table class="hours-table"><thead><tr><th>תאריך</th><th style="text-align:center">שעות</th><th style="text-align:center">מיקום</th><th>הערות</th><th></th></tr></thead><tbody>`;
    for (let e of [...state.hours].reverse()) {
      h += `<tr><td>${e.date}</td><td style="text-align:center;color:#06b6d4;font-weight:600">${e.hours}</td><td style="text-align:center">${e.location}</td><td style="color:#94a3b8">${e.notes || ''}</td><td><button class="btn" style="background:none;color:#ef4444;font-size:13px;padding:2px" onclick="delHours(${e.id})">✕</button></td></tr>`;
    }
    h += `</tbody></table></div>`;
  }
  const avg = daysWorked > 0 ? (totalHours / daysWorked).toFixed(1) : '0';
  h += `<div class="hours-summary"><span>סה״כ: <b style="color:#06b6d4">${totalHours.toFixed(1)} שעות</b></span><span>ממוצע: <b style="color:#8b5cf6">${avg} שעות/יום</b></span></div></div>`;

  // Search & filter
  h += `<div class="controls">
  <input class="search" placeholder="חיפוש..." value="${state.search}" oninput="setSearch(this.value)">
  <button class="filter-btn ${state.filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">הכל</button>
  <button class="filter-btn ${state.filter === 'open' ? 'active' : ''}" onclick="setFilter('open')">פתוחות</button>
  <button class="filter-btn ${state.filter === 'done' ? 'active' : ''}" onclick="setFilter('done')">הושלמו</button>
  </div>`;

  // Categories
  for (let [cat, { color, tasks }] of Object.entries(state.tasks)) {
    const filtered = tasks.filter(t => {
      if (state.filter === 'open' && t.done) return false;
      if (state.filter === 'done' && !t.done) return false;
      if (state.search && !t.text.includes(state.search)) return false;
      return true;
    });
    if (filtered.length === 0 && state.search) continue;
    const catDone = tasks.filter(t => t.done).length;
    const catPct = tasks.length > 0 ? Math.round(catDone / tasks.length * 100) : 0;
    const isCol = state.collapsed[cat];

    const safeCat = cat.replace(/'/g, "\\'");
    h += `<div class="category"><div class="cat-header" style="border-right:3px solid ${color}" onclick="toggleCat('${safeCat}')">
    <div class="info"><span class="arrow" style="transform:rotate(${isCol ? '-90' : '0'}deg)">▼</span><span class="name">${cat}</span><span class="count">${catDone}/${tasks.length}</span></div>
    <div class="cat-progress"><div class="cat-bar"><div class="cat-fill" style="width:${catPct}%;background:${color}"></div></div><span class="cat-pct">${catPct}%</span></div>
    </div>`;
    if (!isCol) {
      h += `<div class="task-list">`;
      for (let t of filtered) {
        h += `<div class="task">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" style="accent-color:${color}">
        <span class="task-text ${t.done ? 'done' : ''}">${t.text}`;
        if (t.v) h += ` <span class="badge badge-green">אומת ✓</span>`;
        if (t.n) h += ` <span class="badge badge-orange">${t.n}</span>`;
        h += `</span></div>`;
      }
      if (filtered.length === 0) h += `<p style="color:#475569;font-size:12px;padding:6px">אין משימות</p>`;
      h += `</div>`;
    }
    h += `</div>`;
  }

  h += `<div class="footer">
    Manager Dashboard — ${new Date().toLocaleDateString('he-IL')}
    <br><a href="#" onclick="resetConfig()" style="color:#475569;font-size:10px">שנה הגדרות</a>
  </div>`;
  app.innerHTML = h;
}

// ============ ACTIONS ============
function saveSetup() {
  const sheetId = document.getElementById('cfg-sheet').value.trim();
  const gid = document.getElementById('cfg-gid').value.trim();
  const webhookUrl = document.getElementById('cfg-webhook').value.trim();
  if (!sheetId) return alert('חסר Sheet ID');
  config = { sheetId, gid, sheetName: '', webhookUrl };
  state.showSetup = false;
  saveConfig();
  fetchSheet();
}

function resetConfig() {
  state.showSetup = !state.showSetup;
  render();
}

function toggle(id) {
  for (let cat of Object.values(state.tasks)) {
    for (let t of cat.tasks) {
      if (t.id === id) {
        t.done = !t.done;
        cacheSheet(state.tasks);
        updateTaskInSheet(id, t.done);
        render();
        return;
      }
    }
  }
}

function setFilter(f) { state.filter = f; render(); }
function setSearch(v) { state.search = v; render(); }
function toggleCat(c) { state.collapsed[c] = !state.collapsed[c]; render(); }
function toggleHoursForm() { state.showHoursForm = !state.showHoursForm; render(); }
function addHours() {
  const d = document.getElementById('h-date').value;
  const hrs = document.getElementById('h-hours').value;
  const loc = document.getElementById('h-loc').value;
  const notes = document.getElementById('h-notes').value;
  if (!hrs) return;
  state.hours.push({ id: Date.now(), date: d, hours: hrs, location: loc, notes });
  state.showHoursForm = false; saveHours(); render();
}
function delHours(id) { state.hours = state.hours.filter(e => e.id !== id); saveHours(); render(); }

// ============ INIT ============
loadConfig();
loadHours();
if (config && config.sheetId) {
  loadCache();
  render();
  fetchSheet();
} else {
  render();
}
</script>
</body>
</html>
