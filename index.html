<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e2433">
<title>בקרה ומעקב Terminal OpS</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1e2433;
  --bg-secondary: #252d3f;
  --card: rgba(37, 45, 63, 0.85);
  --card-solid: #2a3347;
  --border: rgba(148, 163, 184, 0.15);
  --border-light: rgba(148, 163, 184, 0.08);
  --border-hover: rgba(99, 179, 237, 0.35);
  --text: #e8ecf4;
  --text-secondary: #a0aec0;
  --text-muted: #718096;
  --accent: #63b3ed;
  --accent-dim: rgba(99, 179, 237, 0.15);
  --success: #68d391;
  --success-dim: rgba(104, 211, 145, 0.15);
  --warning: #f6ad55;
  --warning-dim: rgba(246, 173, 85, 0.15);
  --danger: #fc8181;
  --danger-dim: rgba(252, 129, 129, 0.15);
  --purple: #b794f4;
  --purple-dim: rgba(183, 148, 244, 0.15);
  --blue: #90cdf4;
  --blue-dim: rgba(144, 205, 244, 0.15);
  --teal: #81e6d9;
  --teal-dim: rgba(129, 230, 217, 0.15);
  --pink: #fbb6ce;
  --pink-dim: rgba(251, 182, 206, 0.15);
  --radius: 14px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-tap-highlight-color: transparent;
  font-weight: 300; line-height: 1.7;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 30% 0%, rgba(99,179,237,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 100%, rgba(183,148,244,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1; }
.mono { font-family: 'JetBrains Mono', monospace; }

.header { padding: 28px 0 20px; margin-bottom: 4px; }
.header h1 { font-size: 26px; font-weight: 500; color: var(--text); }
.header h1 span { color: var(--accent); font-weight: 400; }
.header p { color: var(--text-muted); font-size: 13px; font-weight: 300; margin-top: 4px; }

.sync-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; background: var(--card); backdrop-filter: blur(12px);
  border-radius: var(--radius); margin-bottom: 16px; font-size: 12px;
  border: 1px solid var(--border);
}
.sync-status { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.sync-dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
.sync-dot.err { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
.sync-dot.loading { background: var(--warning); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.overdue-banner {
  background: var(--danger-dim); border: 1px solid rgba(252,129,129,0.3);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px;
  font-size: 13px; color: var(--danger); font-weight: 400;
  display: flex; align-items: center; gap: 8px;
}

.progress-wrap {
  background: var(--card); backdrop-filter: blur(12px);
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
  border: 1px solid var(--border);
}
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 400; }
.progress-bar { background: rgba(255,255,255,0.06); border-radius: 20px; height: 7px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 20px; transition: width 0.4s ease; background: linear-gradient(90deg, var(--accent), var(--purple)); }

.btn {
  border: none; border-radius: var(--radius-sm); padding: 8px 16px;
  cursor: pointer; font-weight: 400; font-size: 12px; font-family: inherit; transition: all 0.2s;
}
.btn-accent { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(99,179,237,0.3); }
.btn-accent:hover { background: rgba(99,179,237,0.25); }
.btn-success { background: var(--success-dim); color: var(--success); border: 1px solid rgba(104,211,145,0.3); }
.btn-success:hover { background: rgba(104,211,145,0.25); }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(252,129,129,0.3); }
.btn-danger:hover { background: rgba(252,129,129,0.25); }
.btn-sm { padding: 5px 12px; font-size: 11px; }

.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.search {
  flex: 1; min-width: 140px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 14px; color: var(--text);
  font-size: 13px; font-family: inherit; font-weight: 300; transition: border-color 0.2s;
}
.search:focus { outline: none; border-color: var(--accent); }
.search::placeholder { color: var(--text-muted); }
.filter-btn {
  background: var(--card); color: var(--text-secondary); border: 1px solid var(--border);
  border-radius: 20px; padding: 7px 16px; cursor: pointer; font-size: 12px;
  font-family: inherit; font-weight: 300; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* Groups */
.group {
  margin-bottom: 16px; border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  background: rgba(37, 45, 63, 0.5); backdrop-filter: blur(12px);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.group.drag-over { border-color: var(--accent); box-shadow: 0 0 20px rgba(99,179,237,0.15); }
.group-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; cursor: pointer; transition: background 0.15s;
  border-bottom: 1px solid var(--border-light);
}
.group-header:hover { background: rgba(99,179,237,0.03); }
.group-title { display: flex; align-items: center; gap: 10px; }
.group-title .arrow { font-size: 10px; transition: transform 0.2s; color: var(--text-muted); }
.group-title .name { font-weight: 400; font-size: 15px; color: var(--text); }
.group-title .count { font-size: 11px; color: var(--text-muted); }
.group-progress { display: flex; align-items: center; gap: 10px; min-width: 120px; }
.group-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.group-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.group-pct { font-size: 12px; color: var(--text-muted); min-width: 32px; text-align: left; font-weight: 400; }
.group-actions { display: flex; gap: 4px; align-items: center; }
.group-body { padding: 8px; min-height: 20px; }

/* Tasks */
.task {
  display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid var(--border-light); transition: all 0.2s;
  background: var(--card-solid); border-radius: var(--radius-sm); margin-bottom: 4px;
  border: 1px solid var(--border-light); cursor: grab;
}
.task:active { cursor: grabbing; }
.task.dragging { opacity: 0.4; border-color: var(--accent); }
.task:hover { border-color: var(--border-hover); }
.task input[type=checkbox] {
  -webkit-appearance: none; appearance: none; width: 18px; height: 18px;
  border: 1.5px solid var(--border); border-radius: 5px; cursor: pointer;
  flex-shrink: 0; transition: all 0.2s; position: relative; background: transparent; margin-top: 2px;
}
.task input[type=checkbox]:hover { border-color: var(--accent); }
.task input[type=checkbox]:checked { background: var(--success); border-color: var(--success); }
.task input[type=checkbox]:checked::after {
  content: ''; position: absolute; left: 5px; top: 2px; width: 5px; height: 9px;
  border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
}
.task-content { flex: 1; min-width: 0; }
.task-text { font-size: 13px; font-weight: 300; display: block; }
.task-text.done { text-decoration: line-through; color: var(--text-muted); }
.task-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; align-items: center; }

.deadline-tag { font-size: 9px; border-radius: 4px; padding: 2px 6px; white-space: nowrap; font-weight: 400; display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }
.deadline-ok { background: var(--accent-dim); color: var(--accent); }
.deadline-soon { background: var(--warning-dim); color: var(--warning); }
.deadline-overdue { background: var(--danger-dim); color: var(--danger); animation: overdue-pulse 2s ease-in-out infinite; }
@keyframes overdue-pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.deadline-set { font-size: 9px; border-radius: 4px; padding: 2px 6px; background: transparent; border: 1px dashed var(--border); color: var(--text-muted); cursor: pointer; }
.deadline-set:hover { border-color: var(--accent); color: var(--accent); }
.deadline-input { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text); font-size: 11px; font-family: inherit; }
.deadline-input:focus { outline: none; }

/* Group tags on tasks */
.group-tag {
  font-size: 9px; border-radius: 4px; padding: 2px 6px;
  white-space: nowrap; font-weight: 400; cursor: pointer; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 3px;
}
.group-tag:hover { filter: brightness(1.3); }

.tag { font-size: 9px; border-radius: 4px; padding: 2px 6px; white-space: nowrap; font-weight: 400; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
.tag:hover { filter: brightness(1.3); }
.tag-green { background: var(--success-dim); color: var(--success); }
.tag-orange { background: var(--warning-dim); color: var(--warning); }
.tag-purple { background: var(--purple-dim); color: var(--purple); }
.tag-blue { background: var(--blue-dim); color: var(--blue); }
.tag-pink { background: var(--pink-dim); color: var(--pink); }
.tag-cyan { background: var(--accent-dim); color: var(--accent); }
.tag-add { background: transparent; border: 1px dashed var(--border); color: var(--text-muted); font-size: 9px; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
.tag-add:hover { border-color: var(--accent); color: var(--accent); }

.note-icon { font-size: 11px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; flex-shrink: 0; margin-top: 2px; padding: 2px; }
.note-icon:hover { color: var(--accent); }
.note-icon.has-note { color: var(--warning); }

.note-popup { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; margin-top: 4px; }
.note-popup textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: 12px; font-family: inherit; resize: vertical; min-height: 50px; }
.note-popup textarea:focus { outline: none; border-color: var(--accent); }

.tag-input-popup { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; margin-top: 4px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.tag-input-popup input { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 12px; font-family: inherit; flex: 1; min-width: 100px; }
.tag-input-popup input:focus { outline: none; border-color: var(--accent); }
.tag-color-dot { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
.tag-color-dot:hover, .tag-color-dot.active { border-color: #fff; transform: scale(1.2); }

.inline-edit { background: var(--bg); border: 1px solid var(--accent); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 14px; font-family: inherit; font-weight: 400; }
.inline-edit:focus { outline: none; }

.footer { text-align: center; padding: 24px 0; color: var(--text-muted); font-size: 11px; font-weight: 300; }
.footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--accent); }

.setup-box { background: var(--card); border: 1.5px dashed var(--accent); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 16px; text-align: center; backdrop-filter: blur(12px); }
.setup-box h3 { color: var(--accent); margin-bottom: 12px; font-weight: 400; font-size: 16px; }
.setup-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 13px; margin: 5px 0; font-family: inherit; font-weight: 300; direction: ltr; }
.setup-box input:focus { outline: none; border-color: var(--accent); }

.error-box { background: var(--danger-dim); border: 1px solid rgba(252,129,129,0.3); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: var(--danger); font-weight: 300; }
.divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 4px 0 16px; }

.add-task-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; backdrop-filter: blur(12px); }
.add-task-form input, .add-task-form select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; background: var(--bg); color: var(--text); }
.add-task-form input:focus, .add-task-form select:focus { outline: none; border-color: var(--accent); }
.add-task-form select option { background: var(--bg-secondary); color: var(--text); }

.group-assign-popup { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
.group-assign-btn { font-size: 10px; padding: 3px 8px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-family: inherit; transition: all 0.2s; }
.group-assign-btn:hover { border-color: var(--accent); color: var(--accent); }
.group-assign-btn.active { border-color: var(--success); color: var(--success); background: var(--success-dim); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@media(max-width:600px) { .container { padding: 12px; } .group-progress { min-width: 80px; } }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ============ CONFIG ============
const CFG_KEY = 'manager-config';
const NOTIFIED_KEY = 'manager-overdue-notified';
const TAG_COLORS = ['cyan','green','orange','purple','blue','pink'];
const GROUP_COLORS = ['#63b3ed','#b794f4','#68d391','#f6ad55','#fbb6ce','#90cdf4','#fc8181','#81e6d9'];
const CONFIG_KEY = '__config_groups__';

let config = null;
let db = null;
let state = {
  tasks: [],
  groups: [],
  filter: 'all', search: '',
  groupCollapsed: {},
  showSetup: false, showAddTask: false,
  syncStatus: 'loading', syncError: '', lastSync: null,
  editingGroup: null,
  editingNote: null, addingTag: null, tagColor: 'cyan',
  editingDeadline: null, assigningGroups: null,
  dragTaskId: null, dragOverGroup: null
};

const DEFAULT_DB_URL = 'https://manager-dashboard-b8627-default-rtdb.firebaseio.com';
const DEFAULT_API_KEY = 'AIzaSyCYVWc3_hOJadijX6Ebclz5VCEWthhuw8w';
const DEFAULT_PROJECT_ID = 'manager-dashboard-b8627';
const DEFAULT_APP_ID = '1:1062866166372:web:7d0e514cd12b357e89b571';

function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function loadConfig() { try { config = JSON.parse(localStorage.getItem(CFG_KEY)); } catch {} if (!config || !config.databaseURL) { config = { databaseURL: DEFAULT_DB_URL, apiKey: DEFAULT_API_KEY, projectId: DEFAULT_PROJECT_ID, appId: DEFAULT_APP_ID }; saveConfig(); } }
function saveConfig() { try { localStorage.setItem(CFG_KEY, JSON.stringify(config)); } catch {} }

// ============ DEADLINE ============
function getDeadlineStatus(dl) { if (!dl) return null; const t = new Date(); t.setHours(0,0,0,0); const d = new Date(dl); d.setHours(0,0,0,0); const diff = Math.ceil((d-t)/864e5); return diff < 0 ? 'overdue' : diff <= 2 ? 'soon' : 'ok'; }
function formatDeadline(dl) { if (!dl) return ''; return new Date(dl).toLocaleDateString('he-IL', { day:'numeric', month:'short' }); }
function getOverdueTasks() { return state.tasks.filter(t => !t.done && t.deadline && getDeadlineStatus(t.deadline) === 'overdue'); }

function checkOverdueAlerts() {
  const overdue = getOverdueTasks(); if (overdue.length === 0) return;
  let notified = {}; try { notified = JSON.parse(localStorage.getItem(NOTIFIED_KEY)) || {}; } catch {}
  const newOd = overdue.filter(t => !notified[t.id]);
  if (newOd.length > 0) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('⚠️ משימות באיחור!', { body: `${newOd.length} משימות עברו דדליין`, tag: 'overdue' });
    }
    newOd.forEach(t => { notified[t.id] = true; });
    try { localStorage.setItem(NOTIFIED_KEY, JSON.stringify(notified)); } catch {}
  }
}

// ============ FIREBASE ============
function initFirebase() {
  if (!config || !config.databaseURL) return;
  if (!firebase.apps.length) firebase.initializeApp({ apiKey: config.apiKey || '', databaseURL: config.databaseURL, projectId: config.projectId || '', appId: config.appId || '' });
  db = firebase.database();
  state.syncStatus = 'loading'; render();

  db.ref('tasks').on('value', (snap) => {
    const data = snap.val() || {};
    // Separate config from tasks
    if (data[CONFIG_KEY]) {
      state.groups = data[CONFIG_KEY].groups || [];
      delete data[CONFIG_KEY];
    }
    state.tasks = Object.entries(data).map(([id, t]) => ({
      id, text: t.text || '', done: !!t.done,
      deadline: t.deadline || '', tags: t.tags || [], comment: t.comment || '',
      groupIds: t.groupIds || []
    }));
    state.syncStatus = 'ok'; state.syncError = ''; state.lastSync = Date.now();
    render(); checkOverdueAlerts();
  }, (err) => { state.syncStatus = 'err'; state.syncError = err.message; render(); });
}

function saveTask(id, data) { if (db) db.ref('tasks/' + id).update(data).catch(e => { state.syncStatus = 'err'; state.syncError = e.message; render(); }); }
function deleteTaskFromFB(id) { if (db) db.ref('tasks/' + id).remove(); }
function saveGroupsConfig() { if (db) db.ref('tasks/' + CONFIG_KEY).set({ groups: state.groups }).catch(e => console.error(e)); }

function clearAllTasks() {
  if (!confirm('למחוק את כל המשימות והקבוצות? פעולה בלתי הפיכה.')) return;
  if (!db) return;
  db.ref('tasks').remove().then(() => { state.tasks = []; state.groups = []; render(); }).catch(e => alert('שגיאה: ' + e.message));
}

// ============ HELPERS ============
function getTasksForGroup(groupId) { return state.tasks.filter(t => (t.groupIds || []).includes(groupId)); }
function getUngroupedTasks() { const allGroupIds = state.groups.map(g => g.id); return state.tasks.filter(t => !(t.groupIds || []).some(gid => allGroupIds.includes(gid))); }
function getGroupStats(tasks) { const total = tasks.length, done = tasks.filter(t => t.done).length; return { total, done, pct: total > 0 ? Math.round(done/total*100) : 0 }; }

function filterTask(t) {
  if (state.filter === 'open' && t.done) return false;
  if (state.filter === 'done' && !t.done) return false;
  if (state.filter === 'overdue' && (t.done || !t.deadline || getDeadlineStatus(t.deadline) !== 'overdue')) return false;
  if (state.search && !t.text.includes(state.search)) return false;
  return true;
}

// ============ RENDER ============
function render() {
  const app = document.getElementById('app');
  if (state.showSetup || !config || !config.databaseURL) { app.innerHTML = renderSetup(); return; }

  const allTasks = state.tasks;
  const total = allTasks.length, done = allTasks.filter(t => t.done).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const syncTime = state.lastSync ? new Date(state.lastSync).toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' }) : '---';
  const overdue = getOverdueTasks();

  let h = '';

  h += `<div class="header"><h1>בקרה ומעקב <span>Terminal OpS</span></h1>
    <p>${new Date().toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</p></div>`;

  h += `<div class="sync-bar"><div class="sync-status"><span class="sync-dot ${state.syncStatus}"></span>
    <span>${state.syncStatus==='ok'?'מסונכרן':state.syncStatus==='loading'?'מסנכרן...':'שגיאה'}</span> &middot; ${syncTime}</div>
    <button class="btn btn-ghost btn-sm" onclick="location.reload()">רענון</button></div>`;

  if (state.syncError) h += `<div class="error-box">${escapeHtml(state.syncError)}</div>`;
  if (overdue.length > 0) h += `<div class="overdue-banner"><span style="font-size:18px">⚠️</span><span><b>${overdue.length} משימות באיחור!</b></span></div>`;

  h += `<div class="progress-wrap"><div class="progress-header"><span>התקדמות כללית — ${done}/${total}</span><span class="mono" style="color:var(--accent)">${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;

  h += `<div class="controls">
    <input class="search" placeholder="חיפוש משימות..." value="${escapeHtml(state.search)}" oninput="setSearch(this.value)">
    <button class="filter-btn ${state.filter==='all'?'active':''}" onclick="setFilter('all')">הכל</button>
    <button class="filter-btn ${state.filter==='open'?'active':''}" onclick="setFilter('open')">פתוחות</button>
    <button class="filter-btn ${state.filter==='done'?'active':''}" onclick="setFilter('done')">הושלמו</button>
    <button class="filter-btn ${state.filter==='overdue'?'active':''}" onclick="setFilter('overdue')" ${overdue.length>0?'style="color:var(--danger);border-color:var(--danger)"':''}>באיחור${overdue.length>0?' ('+overdue.length+')':''}</button>
    <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()" style="margin-right:auto">+ משימה</button>
    <button class="btn btn-accent btn-sm" onclick="promptAddGroup()">+ קבוצה</button>
  </div>`;

  if (state.showAddTask) h += renderAddTaskForm();

  // Groups
  state.groups.forEach(g => { h += renderGroup(g); });

  // Ungrouped
  const ungrouped = getUngroupedTasks().filter(filterTask);
  if (ungrouped.length > 0 || state.tasks.length === 0) h += renderUngroupedSection(ungrouped);

  h += `<div class="footer">בקרה ומעקב Terminal OpS &middot; <span class="mono">${new Date().toLocaleDateString('he-IL')}</span>
    <br><a href="#" onclick="resetConfig()">הגדרות</a> &middot; <a href="#" onclick="clearAllTasks()">ניקוי הכל</a></div>`;

  app.innerHTML = h;
}

function renderSetup() {
  return `<div class="header"><h1>בקרה ומעקב <span>Terminal OpS</span></h1><p>הגדרות חיבור</p></div>
  <div class="setup-box"><h3>חיבור Firebase</h3>
    <p style="color:var(--text-muted);font-size:12px;margin-bottom:14px">חבר את מסד הנתונים שלך</p>
    <input id="cfg-dburl" placeholder="Database URL" value="${config?.databaseURL||''}">
    <input id="cfg-apikey" placeholder="API Key" value="${config?.apiKey||''}">
    <input id="cfg-projectid" placeholder="Project ID" value="${config?.projectId||''}">
    <input id="cfg-appid" placeholder="App ID" value="${config?.appId||''}">
    <br><button class="btn btn-accent" onclick="saveSetup()" style="margin-top:10px;width:100%;padding:10px">התחבר</button></div>`;
}

function renderAddTaskForm() {
  let groupCheckboxes = state.groups.map(g =>
    `<label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;cursor:pointer">
      <input type="checkbox" class="new-task-group" value="${escapeHtml(g.id)}" style="width:14px;height:14px">
      <span style="width:8px;height:8px;border-radius:50%;background:${g.color};display:inline-block"></span>${escapeHtml(g.name)}</label>`
  ).join('');

  return `<div class="add-task-form">
    <input id="new-task-text" placeholder="תיאור המשימה..." style="width:100%;margin-bottom:8px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="new-task-deadline" type="date" style="direction:ltr" title="דדליין">
      <input id="new-task-tags" placeholder="תגיות (פסיקים)" style="width:120px">
      <button class="btn btn-success btn-sm" onclick="addTask()">הוסף</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()">ביטול</button>
    </div>
    ${state.groups.length > 0 ? `<div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;align-items:center"><span style="font-size:11px;color:var(--text-muted)">קבוצות:</span>${groupCheckboxes}</div>` : ''}
  </div>`;
}

function renderGroup(g) {
  const tasks = getTasksForGroup(g.id).filter(filterTask);
  const allGroupTasks = getTasksForGroup(g.id);
  const stats = getGroupStats(allGroupTasks);
  const isCol = state.groupCollapsed[g.id];
  const isEditing = state.editingGroup === g.id;
  const sid = escapeHtml(g.id);

  let h = `<div class="group ${state.dragOverGroup===g.id?'drag-over':''}" data-group="${sid}"
    ondragover="onDragOver(event,'${sid}')" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${sid}')">
    <div class="group-header" onclick="toggleGroup('${sid}')">
      <div class="group-title">
        <span class="arrow" style="transform:rotate(${isCol?'-90':'0'}deg)">&#9662;</span>
        <span style="width:4px;height:20px;border-radius:2px;background:${g.color};display:inline-block"></span>`;
  if (isEditing) {
    h += `<input class="inline-edit" id="edit-g-${sid}" value="${escapeHtml(g.name)}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')saveGroupName('${sid}')" style="width:150px">
      <button class="btn btn-success btn-sm" onclick="event.stopPropagation();saveGroupName('${sid}')">אישור</button>`;
  } else {
    h += `<span class="name">${escapeHtml(g.name)}</span><span class="count">${stats.done}/${stats.total}</span>`;
  }
  h += `</div><div style="display:flex;align-items:center;gap:12px">
    <div class="group-progress"><div class="group-bar"><div class="group-fill" style="width:${stats.pct}%;background:${g.color}"></div></div>
      <span class="group-pct mono">${stats.pct}%</span></div>
    <div class="group-actions" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-sm" onclick="startEditGroup('${sid}')" title="שנה שם">&#9998;</button>
      <button class="btn btn-ghost btn-sm" onclick="deleteGroup('${sid}')" title="מחק" style="color:var(--danger)">&#10005;</button>
    </div></div></div>`;

  if (!isCol) {
    h += `<div class="group-body">`;
    if (tasks.length === 0) {
      h += `<p style="color:var(--text-muted);font-size:12px;padding:12px;text-align:center">גרור משימות לכאן</p>`;
    } else {
      tasks.forEach(t => { h += renderTask(t); });
    }
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function renderUngroupedSection(tasks) {
  const allUngrouped = getUngroupedTasks();
  const stats = getGroupStats(allUngrouped);
  const isCol = state.groupCollapsed['__ungrouped__'];

  let h = `<div class="group ${state.dragOverGroup==='__ungrouped__'?'drag-over':''}" data-group="__ungrouped__"
    ondragover="onDragOver(event,'__ungrouped__')" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'__ungrouped__')">
    <div class="group-header" onclick="toggleGroup('__ungrouped__')">
      <div class="group-title">
        <span class="arrow" style="transform:rotate(${isCol?'-90':'0'}deg)">&#9662;</span>
        <span style="width:4px;height:20px;border-radius:2px;background:var(--text-muted);display:inline-block"></span>
        <span class="name" style="color:var(--text-muted)">ללא קבוצה</span>
        <span class="count">${stats.done}/${stats.total}</span>
      </div>
      <div class="group-progress"><div class="group-bar"><div class="group-fill" style="width:${stats.pct}%;background:var(--text-muted)"></div></div>
        <span class="group-pct mono">${stats.pct}%</span></div>
    </div>`;
  if (!isCol) {
    h += `<div class="group-body">`;
    if (tasks.length === 0) h += `<p style="color:var(--text-muted);font-size:12px;padding:12px;text-align:center">אין משימות</p>`;
    else tasks.forEach(t => { h += renderTask(t); });
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function renderTask(t) {
  const hasComment = t.comment && t.comment.trim().length > 0;
  const isEditingNote = state.editingNote === t.id;
  const isAddingTag = state.addingTag === t.id;
  const isEditingDl = state.editingDeadline === t.id;
  const isAssigning = state.assigningGroups === t.id;
  const dlStatus = t.done ? null : getDeadlineStatus(t.deadline);

  let h = `<div class="task" draggable="true" data-task-id="${t.id}" ondragstart="onTaskDragStart(event,'${t.id}')" ondragend="onTaskDragEnd(event)">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleDone('${t.id}')">
    <div class="task-content">
      <span class="task-text ${t.done?'done':''}">${escapeHtml(t.text)}</span>
      <div class="task-meta">`;

  // Deadline
  if (isEditingDl) {
    h += `<input class="deadline-input" type="date" id="dl-${t.id}" value="${t.deadline||''}" onchange="saveDeadline('${t.id}')" onblur="state.editingDeadline=null;render()" style="direction:ltr">`;
  } else if (t.deadline) {
    const cls = dlStatus==='overdue'?'deadline-overdue':dlStatus==='soon'?'deadline-soon':'deadline-ok';
    const icon = dlStatus==='overdue'?'⚠️ ':dlStatus==='soon'?'⏰ ':'📅 ';
    h += `<span class="deadline-tag ${cls}" onclick="startEditDeadline('${t.id}')">${icon}${formatDeadline(t.deadline)}</span>`;
  } else {
    h += `<span class="deadline-set" onclick="startEditDeadline('${t.id}')">📅 דדליין</span>`;
  }

  // Group tags
  (t.groupIds || []).forEach(gid => {
    const g = state.groups.find(x => x.id === gid);
    if (g) h += `<span class="group-tag" style="background:${g.color}20;color:${g.color}" onclick="removeFromGroup('${t.id}','${gid}')" title="הסר מקבוצה">${escapeHtml(g.name)} ✕</span>`;
  });
  h += `<span class="tag-add" onclick="startAssignGroups('${t.id}')">+ קבוצה</span>`;

  // Regular tags
  (t.tags || []).forEach((tag, i) => {
    h += `<span class="tag tag-${tag.color||'cyan'}" onclick="removeTag('${t.id}',${i})" title="הסר">${escapeHtml(tag.text)} ✕</span>`;
  });
  h += `<span class="tag-add" onclick="startAddTag('${t.id}')">+ תגית</span>`;
  h += `</div>`;

  // Group assign popup
  if (isAssigning) {
    h += `<div class="group-assign-popup">`;
    state.groups.forEach(g => {
      const isIn = (t.groupIds||[]).includes(g.id);
      h += `<button class="group-assign-btn ${isIn?'active':''}" onclick="toggleGroupAssign('${t.id}','${g.id}')">
        <span style="width:6px;height:6px;border-radius:50%;background:${g.color};display:inline-block"></span> ${escapeHtml(g.name)} ${isIn?'✓':''}</button>`;
    });
    h += `<button class="btn btn-ghost btn-sm" onclick="state.assigningGroups=null;render()">סגור</button></div>`;
  }

  // Tag input
  if (isAddingTag) {
    h += `<div class="tag-input-popup"><input id="tag-in-${t.id}" placeholder="תגית..." onkeydown="if(event.key==='Enter')saveTag('${t.id}')">`;
    TAG_COLORS.forEach(c => { h += `<span class="tag-color-dot ${state.tagColor===c?'active':''}" style="background:var(--${c})" onclick="state.tagColor='${c}';render()"></span>`; });
    h += `<button class="btn btn-success btn-sm" onclick="saveTag('${t.id}')">+</button><button class="btn btn-ghost btn-sm" onclick="state.addingTag=null;render()">✕</button></div>`;
  }

  // Comment
  if (isEditingNote) {
    h += `<div class="note-popup"><textarea id="note-${t.id}" placeholder="הערה...">${escapeHtml(t.comment||'')}</textarea>
      <div style="display:flex;gap:4px;margin-top:4px"><button class="btn btn-success btn-sm" onclick="saveComment('${t.id}')">שמור</button>
      <button class="btn btn-ghost btn-sm" onclick="state.editingNote=null;render()">ביטול</button></div></div>`;
  } else if (hasComment) {
    h += `<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;padding:4px 8px;background:rgba(255,255,255,0.02);border-radius:4px;border-right:2px solid var(--accent)">${escapeHtml(t.comment)}</div>`;
  }

  h += `</div><span class="note-icon ${hasComment?'has-note':''}" onclick="startEditNote('${t.id}')" title="הערה">💬</span>
    <span class="note-icon" onclick="deleteTask('${t.id}')" title="מחק משימה" style="color:var(--danger);opacity:0.5">🗑</span></div>`;
  return h;
}

// ============ ACTIONS ============
function saveSetup() {
  const databaseURL = document.getElementById('cfg-dburl').value.trim();
  if (!databaseURL) return alert('חסר כתובת מסד נתונים');
  config = { databaseURL, apiKey: document.getElementById('cfg-apikey').value.trim(), projectId: document.getElementById('cfg-projectid').value.trim(), appId: document.getElementById('cfg-appid').value.trim() };
  state.showSetup = false; saveConfig(); initFirebase();
}
function resetConfig() { state.showSetup = !state.showSetup; render(); }
function setFilter(f) { state.filter = f; render(); }
function setSearch(v) { state.search = v; render(); }
function toggleGroup(id) { state.groupCollapsed[id] = !state.groupCollapsed[id]; render(); }
function toggleAddTask() { state.showAddTask = !state.showAddTask; render(); }

function toggleDone(id) {
  const t = state.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; render(); saveTask(id, { done: t.done }); }
}

function addTask() {
  const text = document.getElementById('new-task-text').value.trim();
  if (!text) return alert('הכנס תיאור למשימה');
  if (!db) return alert('Firebase לא מחובר');
  const deadline = document.getElementById('new-task-deadline').value || '';
  const tagsInput = document.getElementById('new-task-tags').value.trim();
  const tags = tagsInput ? tagsInput.split(',').map((t,i) => ({ text:t.trim(), color:TAG_COLORS[i%TAG_COLORS.length] })).filter(t => t.text) : [];
  const groupIds = [...document.querySelectorAll('.new-task-group:checked')].map(cb => cb.value);
  const id = String(Date.now());
  db.ref('tasks/' + id).set({ text, done:false, deadline, tags, comment:'', groupIds })
    .then(() => { state.showAddTask = false; }).catch(e => alert('שגיאה: ' + e.message));
}

// Deadline
function startEditDeadline(id) { state.editingDeadline = id; render(); setTimeout(() => { const el = document.getElementById('dl-'+id); if (el) el.showPicker ? el.showPicker() : el.focus(); }, 50); }
function saveDeadline(id) { const el = document.getElementById('dl-'+id); if (!el) return; const dl = el.value||''; const t = state.tasks.find(x=>x.id===id); if (t) { t.deadline=dl; state.editingDeadline=null; render(); saveTask(id,{deadline:dl}); } }

// Groups assign
function startAssignGroups(id) { state.assigningGroups = id; render(); }
function toggleGroupAssign(taskId, groupId) {
  const t = state.tasks.find(x => x.id === taskId); if (!t) return;
  const gids = [...(t.groupIds||[])];
  const idx = gids.indexOf(groupId);
  if (idx >= 0) gids.splice(idx,1); else gids.push(groupId);
  t.groupIds = gids; render(); saveTask(taskId, { groupIds: gids });
}
function removeFromGroup(taskId, groupId) {
  const t = state.tasks.find(x => x.id === taskId); if (!t) return;
  t.groupIds = (t.groupIds||[]).filter(g => g !== groupId);
  render(); saveTask(taskId, { groupIds: t.groupIds });
}

// Tags
function startAddTag(id) { state.addingTag = id; state.tagColor = 'cyan'; render(); setTimeout(() => { const el = document.getElementById('tag-in-'+id); if (el) el.focus(); }, 50); }
function saveTag(id) {
  const el = document.getElementById('tag-in-'+id); if (!el) return;
  const text = el.value.trim(); if (!text) return;
  const t = state.tasks.find(x=>x.id===id); if (!t) return;
  t.tags = [...(t.tags||[]), { text, color: state.tagColor }];
  state.addingTag = null; render(); saveTask(id, { tags: t.tags });
}
function removeTag(id, idx) {
  const t = state.tasks.find(x=>x.id===id); if (!t) return;
  t.tags = [...(t.tags||[])]; t.tags.splice(idx,1); render(); saveTask(id, { tags: t.tags });
}

// Comments
function startEditNote(id) { state.editingNote = id; render(); setTimeout(() => { const el = document.getElementById('note-'+id); if (el) el.focus(); }, 50); }
function saveComment(id) {
  const el = document.getElementById('note-'+id); if (!el) return;
  const t = state.tasks.find(x=>x.id===id); if (!t) return;
  t.comment = el.value; state.editingNote = null; render(); saveTask(id, { comment: t.comment });
}

// Delete task
function deleteTask(id) {
  if (!confirm('למחוק את המשימה?')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  render(); deleteTaskFromFB(id);
}

// Groups CRUD
function promptAddGroup() {
  const name = prompt('שם הקבוצה:'); if (!name || !name.trim()) return;
  const id = 'g_' + Date.now();
  const color = GROUP_COLORS[state.groups.length % GROUP_COLORS.length];
  state.groups.push({ id, name: name.trim(), color });
  saveGroupsConfig(); render();
}
function startEditGroup(id) { state.editingGroup = id; render(); setTimeout(() => { const el = document.getElementById('edit-g-'+id); if (el) { el.focus(); el.select(); } }, 50); }
function saveGroupName(id) {
  const el = document.getElementById('edit-g-'+id); if (!el) return;
  const name = el.value.trim(); if (!name) return;
  const g = state.groups.find(x => x.id === id);
  if (g) { g.name = name; state.editingGroup = null; render(); saveGroupsConfig(); }
}
function deleteGroup(id) {
  if (!confirm('למחוק את הקבוצה?')) return;
  state.groups = state.groups.filter(g => g.id !== id);
  // Remove group from all tasks
  state.tasks.forEach(t => {
    if ((t.groupIds||[]).includes(id)) {
      t.groupIds = t.groupIds.filter(g => g !== id);
      saveTask(t.id, { groupIds: t.groupIds });
    }
  });
  saveGroupsConfig(); render();
}

// Drag & drop (task → group)
function onTaskDragStart(e, taskId) {
  state.dragTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
  setTimeout(() => { const el = document.querySelector(`[data-task-id="${taskId}"]`); if (el) el.classList.add('dragging'); }, 0);
}
function onTaskDragEnd(e) {
  state.dragTaskId = null; state.dragOverGroup = null;
  document.querySelectorAll('.task.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.group.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e, groupId) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  if (state.dragOverGroup !== groupId) { state.dragOverGroup = groupId; render(); }
}
function onDragLeave(e) { if (e.currentTarget && !e.currentTarget.contains(e.relatedTarget)) state.dragOverGroup = null; }
function onDrop(e, groupId) {
  e.preventDefault();
  const taskId = state.dragTaskId || e.dataTransfer.getData('text/plain');
  if (!taskId) return;
  const t = state.tasks.find(x => x.id === taskId); if (!t) return;

  if (groupId === '__ungrouped__') {
    // Remove from all groups
    t.groupIds = [];
  } else {
    // Add to this group (keep existing)
    if (!(t.groupIds||[]).includes(groupId)) {
      t.groupIds = [...(t.groupIds||[]), groupId];
    }
  }
  state.dragTaskId = null; state.dragOverGroup = null;
  render(); saveTask(taskId, { groupIds: t.groupIds });
}

// ============ INIT ============
loadConfig();
if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
if (config && config.databaseURL) { render(); initFirebase(); } else render();
</script>
</body>
</html>
