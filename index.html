<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#faf8f5">
<title>Manager Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Heebo:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #e8e4df;
  --border-light: #f0ece7;
  --text: #2d2a26;
  --text-secondary: #8a8580;
  --text-muted: #b5b0aa;
  --accent: #c47f5a;
  --accent-light: #f0ddd0;
  --success: #7ab07a;
  --success-light: #e8f5e8;
  --warning: #d4a853;
  --warning-light: #faf0d8;
  --danger: #c76a6a;
  --danger-light: #fae8e8;
  --purple: #9b8ec4;
  --purple-light: #ede8f5;
  --blue: #6b9bc3;
  --blue-light: #e4eef7;
  --teal: #6aada0;
  --teal-light: #e0f2ef;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.06);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  font-weight: 300;
  line-height: 1.6;
}
.container { max-width: 880px; margin: 0 auto; padding: 20px 16px; }

/* Header */
.header {
  padding: 28px 0 20px;
  margin-bottom: 4px;
}
.header h1 {
  font-size: 26px;
  font-weight: 200;
  color: var(--text);
  letter-spacing: -0.5px;
}
.header p {
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 300;
  margin-top: 4px;
}

/* Sync bar */
.sync-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: var(--card);
  border-radius: var(--radius);
  margin-bottom: 16px;
  font-size: 12px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow);
}
.sync-status { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.sync-dot.ok { background: var(--success); }
.sync-dot.err { background: var(--danger); }
.sync-dot.loading { background: var(--warning); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
}
.stat:hover { box-shadow: var(--shadow-hover); }
.stat-val { font-size: 22px; font-weight: 400; letter-spacing: -0.5px; }
.stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 300; }

/* Progress */
.progress-wrap {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow);
}
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 400; }
.progress-bar { background: var(--border-light); border-radius: 20px; height: 6px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, var(--success), var(--teal)); height: 100%; border-radius: 20px; transition: width 0.4s ease; }

/* Buttons */
.btn {
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  cursor: pointer;
  font-weight: 400;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 0;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #b37250; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #6a9e6a; }
.btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--accent-light); }
.btn-sm { padding: 5px 12px; font-size: 11px; }

/* Hours section */
.hours-section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow);
}
.hours-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.hours-header h2 { font-size: 15px; font-weight: 400; color: var(--accent); }
.hours-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-group label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 300; }
.form-group input, .form-group select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  font-weight: 300;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.hours-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.hours-table th { text-align: right; padding: 6px 4px; color: var(--text-muted); border-bottom: 1px solid var(--border-light); font-weight: 400; }
.hours-table td { padding: 6px 4px; font-weight: 300; }
.hours-summary {
  display: flex;
  gap: 16px;
  font-size: 12px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-light);
  flex-wrap: wrap;
  font-weight: 300;
}

/* Search & filters */
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.search {
  flex: 1;
  min-width: 140px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  font-weight: 300;
  transition: border-color 0.2s;
}
.search:focus { outline: none; border-color: var(--accent); }
.search::placeholder { color: var(--text-muted); }
.filter-btn {
  background: var(--card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 7px 16px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 300;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Categories */
.category {
  margin-bottom: 10px;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
}
.category:hover { box-shadow: var(--shadow-hover); }
.cat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.cat-header:hover { background: var(--bg); }
.cat-header .info { display: flex; align-items: center; gap: 10px; }
.cat-header .arrow { font-size: 10px; transition: transform 0.2s; color: var(--text-muted); }
.cat-header .name { font-weight: 400; font-size: 14px; }
.cat-header .count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg);
  border-radius: 12px;
  padding: 2px 10px;
  font-weight: 300;
}
.cat-progress { display: flex; align-items: center; gap: 8px; }
.cat-bar { width: 50px; height: 3px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
.cat-fill { height: 100%; border-radius: 2px; }
.cat-pct { font-size: 11px; color: var(--text-muted); min-width: 28px; text-align: left; font-weight: 300; }

/* Task list */
.task-list { padding: 0 16px 12px; }
.task {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.15s;
}
.task:last-child { border-bottom: none; }
.task:hover { background: rgba(0,0,0,0.01); }
.task input[type=checkbox] {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  position: relative;
}
.task input[type=checkbox]:checked {
  background: var(--success);
  border-color: var(--success);
}
.task input[type=checkbox]:checked::after {
  content: '';
  position: absolute;
  left: 5px;
  top: 2px;
  width: 5px;
  height: 9px;
  border: solid #fff;
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}
.task-text { flex: 1; font-size: 13px; font-weight: 300; }
.task-text.done { text-decoration: line-through; color: var(--text-muted); }
.badge {
  font-size: 10px;
  border-radius: 4px;
  padding: 2px 6px;
  margin-right: 4px;
  white-space: nowrap;
  font-weight: 400;
}
.badge-green { background: var(--success-light); color: var(--success); }
.badge-orange { background: var(--warning-light); color: var(--warning); }

/* Footer */
.footer {
  text-align: center;
  padding: 24px 0;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 300;
}
.footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--accent); }

/* Setup */
.setup-box {
  background: var(--card);
  border: 1.5px dashed var(--accent);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 16px;
  text-align: center;
}
.setup-box h3 { color: var(--accent); margin-bottom: 12px; font-weight: 400; font-size: 16px; }
.setup-box input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  font-size: 13px;
  margin: 5px 0;
  font-family: inherit;
  font-weight: 300;
  direction: ltr;
}
.setup-box input:focus { outline: none; border-color: var(--accent); }

/* Error box */
.error-box {
  background: var(--danger-light);
  border: 1px solid #e0b8b8;
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--danger);
  font-weight: 300;
}

/* Decorative line accent */
.divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 4px 0 16px; }

@media(max-width:600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .hours-form { grid-template-columns: 1fr 1fr; }
  .container { padding: 12px; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ============ CONFIG ============
const CFG_KEY = 'manager-config';
const HOURS_KEY = 'manager-work-hours-v2';

const CAT_COLORS = {
  'מיידי':'#c76a6a','באגים':'#d4a853',"פיצ'רים עמר":'#9b8ec4',
  "פיצ'רים יובל לי":'#6b9bc3','טווח קרוב':'#6aada0','טווח רחוק':'#8a8580',
  'Production':'#7ab07a','n8n אימות':'#b87dbf'
};

let config = null;
let state = { tasks: {}, hours: [], filter: 'all', search: '', collapsed: {}, showHoursForm: false, showSetup: false, showAddTask: false, syncStatus: 'loading', syncError: '', lastSync: null };

const DEFAULT_DB_URL = 'https://manager-dashboard-b8627-default-rtdb.firebaseio.com';
const DEFAULT_API_KEY = 'AIzaSyCYVWc3_hOJadijX6Ebclz5VCEWthhuw8w';
const DEFAULT_PROJECT_ID = 'manager-dashboard-b8627';
const DEFAULT_APP_ID = '1:1062866166372:web:7d0e514cd12b357e89b571';

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadConfig() {
  try { config = JSON.parse(localStorage.getItem(CFG_KEY)); } catch {}
  if (!config || !config.databaseURL) {
    config = { databaseURL: DEFAULT_DB_URL, apiKey: DEFAULT_API_KEY, projectId: DEFAULT_PROJECT_ID, appId: DEFAULT_APP_ID };
    saveConfig();
  }
}
function saveConfig() {
  try { localStorage.setItem(CFG_KEY, JSON.stringify(config)); } catch {}
}
function loadHours() {
  try { state.hours = JSON.parse(localStorage.getItem(HOURS_KEY)) || []; } catch { state.hours = []; }
}
function saveHours() {
  try { localStorage.setItem(HOURS_KEY, JSON.stringify(state.hours)); } catch {}
}
// ============ FIREBASE DATA LAYER ============
let db = null;

function initFirebase() {
  if (!config || !config.databaseURL) return;
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: config.apiKey || '',
      databaseURL: config.databaseURL,
      projectId: config.projectId || '',
      appId: config.appId || ''
    });
  }
  db = firebase.database();
  state.syncStatus = 'loading';
  render();

  // Real-time listener — auto-syncs across devices
  db.ref('tasks').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      state.tasks = firebaseToTasks(data);
    } else {
      state.tasks = {};
    }
    state.syncStatus = 'ok';
    state.syncError = '';
    state.lastSync = Date.now();
    render();
  }, (err) => {
    console.error('Firebase read error:', err.message);
    state.syncStatus = 'err';
    state.syncError = 'שגיאת קריאה: ' + err.message;
    render();
  });
}

function firebaseToTasks(data) {
  const cats = {};
  for (const [id, t] of Object.entries(data)) {
    const cat = t.category || 'אחר';
    if (!cats[cat]) cats[cat] = { color: CAT_COLORS[cat] || '#8a8580', tasks: [] };
    cats[cat].tasks.push({
      id: parseInt(id) || 0,
      text: t.text || '',
      done: !!t.done,
      v: !!t.verified,
      n: t.note || '',
      est: parseFloat(t.est) || 0,
      priority: parseInt(t.priority) || 9
    });
  }
  return cats;
}

function updateTaskInFirebase(id, updates) {
  if (!db) return;
  db.ref('tasks/' + id).update(updates).catch((e) => {
    console.error('Write failed:', e.message);
    state.syncStatus = 'err';
    state.syncError = 'שמירה נכשלה: ' + e.message;
    render();
  });
}

// ============ RENDER ============
function render() {
  const app = document.getElementById('app');

  if (state.showSetup || !config || !config.databaseURL) {
    app.innerHTML = `
    <div class="header"><h1>Manager Dashboard</h1><p>Setup</p></div>
    <div class="setup-box">
      <h3>Firebase Connection</h3>
      <p style="color:var(--text-muted);font-size:12px;margin-bottom:14px">
        1. Create a Firebase project at firebase.google.com<br>
        2. Create a Realtime Database<br>
        3. Copy the database URL and paste below
      </p>
      <input id="cfg-dburl" placeholder="Database URL (https://xxx.firebaseio.com)" value="${config?.databaseURL || ''}">
      <input id="cfg-apikey" placeholder="API Key" value="${config?.apiKey || ''}">
      <input id="cfg-projectid" placeholder="Project ID" value="${config?.projectId || ''}">
      <input id="cfg-appid" placeholder="App ID" value="${config?.appId || ''}">
      <br><button class="btn btn-success" onclick="saveSetup()" style="margin-top:10px;width:100%;padding:10px">Connect</button>
      ${Object.keys(state.tasks).length > 0 ? '<button class="btn btn-ghost" onclick="importFromCurrentData()" style="margin-top:8px;width:100%;padding:10px">Import from current data</button>' : ''}
    </div>`;
    return;
  }

  const allTasks = Object.values(state.tasks).flatMap(c => c.tasks);
  const total = allTasks.length, done = allTasks.filter(t => t.done).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const totalHours = state.hours.reduce((s, e) => s + (parseFloat(e.hours) || 0), 0);
  const daysWorked = new Set(state.hours.map(e => e.date)).size;
  const deadline = new Date('2026-03-31'), today = new Date();
  const daysLeft = Math.max(0, Math.ceil((deadline - today) / 864e5));
  const remaining = total - done;
  const pace = daysLeft > 0 ? (remaining / daysLeft).toFixed(1) : '--';
  const syncTime = state.lastSync ? new Date(state.lastSync).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }) : '---';
  const syncClass = state.syncStatus;

  let h = `
<div class="header">
  <h1>Manager Dashboard</h1>
  <p>${daysLeft} days left</p>
</div>
<div class="sync-bar">
  <div class="sync-status"><span class="sync-dot ${syncClass}"></span> ${syncClass === 'ok' ? 'Synced' : syncClass === 'loading' ? 'Loading...' : 'Sync error'} &middot; ${syncTime}</div>
  <button class="btn btn-ghost btn-sm" onclick="location.reload()">Refresh</button>
</div>
${state.syncError ? `<div class="error-box">${escapeHtml(state.syncError)}<br><span style="color:var(--text-muted);font-size:10px;direction:ltr;display:block;margin-top:4px">DB: ${config?.databaseURL || '?'}</span></div>` : ''}
<div class="stats">
  <div class="stat"><div class="stat-val" style="color:var(--blue)">${total}</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--success)">${done}</div><div class="stat-lbl">Done (${pct}%)</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--accent)">${remaining}</div><div class="stat-lbl">Remaining</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--purple)">${pace}/day</div><div class="stat-lbl">Pace needed</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--teal)">${totalHours.toFixed(1)}</div><div class="stat-lbl">Hours</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--warning)">${daysWorked}</div><div class="stat-lbl">Days worked</div></div>
</div>
<div class="progress-wrap">
  <div class="progress-header"><span>Overall progress</span><span style="color:var(--success);font-weight:500">${pct}%</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>`;

  // Work hours
  h += `<div class="hours-section">
  <div class="hours-header"><h2>Work hours</h2><button class="btn btn-ghost btn-sm" onclick="toggleHoursForm()">${state.showHoursForm ? 'Cancel' : '+ Add'}</button></div>`;
  if (state.showHoursForm) {
    h += `<div class="hours-form">
    <div class="form-group"><label>Date</label><input type="date" id="h-date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="form-group"><label>Hours</label><input type="number" id="h-hours" step="0.5" min="0" max="16" placeholder="3.5" style="direction:ltr"></div>
    <div class="form-group"><label>Location</label><select id="h-loc"><option>Home</option><option>Office</option><option>Field</option></select></div>
    <div class="form-group"><label>Notes</label><input type="text" id="h-notes" placeholder="What did you work on..."></div>
    </div><button class="btn btn-success" onclick="addHours()" style="width:100%;margin-bottom:8px">Save</button>`;
  }
  if (state.hours.length > 0) {
    h += `<div style="max-height:180px;overflow-y:auto"><table class="hours-table"><thead><tr><th>Date</th><th style="text-align:center">Hours</th><th style="text-align:center">Location</th><th>Notes</th><th></th></tr></thead><tbody>`;
    for (let e of [...state.hours].reverse()) {
      h += `<tr><td>${e.date}</td><td style="text-align:center;color:var(--teal);font-weight:400">${e.hours}</td><td style="text-align:center">${e.location}</td><td style="color:var(--text-secondary)">${escapeHtml(e.notes || '')}</td><td><button class="btn" style="background:none;color:var(--danger);font-size:13px;padding:2px" onclick="delHours(${e.id})">x</button></td></tr>`;
    }
    h += `</tbody></table></div>`;
  }
  const avg = daysWorked > 0 ? (totalHours / daysWorked).toFixed(1) : '0';
  h += `<div class="hours-summary"><span>Total: <b style="color:var(--teal)">${totalHours.toFixed(1)}h</b></span><span>Avg: <b style="color:var(--purple)">${avg}h/day</b></span></div></div>`;

  h += `<div class="divider"></div>`;

  // Search & filter
  h += `<div class="controls">
  <input class="search" placeholder="Search tasks..." value="${state.search}" oninput="setSearch(this.value)">
  <button class="filter-btn ${state.filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
  <button class="filter-btn ${state.filter === 'open' ? 'active' : ''}" onclick="setFilter('open')">Open</button>
  <button class="filter-btn ${state.filter === 'done' ? 'active' : ''}" onclick="setFilter('done')">Done</button>
  <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()" style="margin-right:auto">+ Add task</button>
  </div>`;
  if (state.showAddTask) {
    const catOptions = Object.keys(CAT_COLORS).map(c => `<option value="${c}">${c}</option>`).join('');
    h += `<div class="add-task-form" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px">
    <input id="new-task-text" placeholder="תיאור המשימה..." style="width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;font-family:inherit;font-size:14px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="new-task-cat" onchange="document.getElementById('new-task-custom-cat').style.display=this.value==='__custom__'?'inline-block':'none'" style="padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px">
        ${catOptions}
        <option value="__custom__">+ קטגוריה חדשה</option>
      </select>
      <input id="new-task-custom-cat" placeholder="שם קטגוריה" style="display:none;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;width:140px">
      <button class="btn btn-success btn-sm" onclick="addTask()" style="padding:6px 16px">Add</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()">Cancel</button>
    </div>
    </div>`;
  }

  // Categories
  for (let [cat, { color, tasks }] of Object.entries(state.tasks)) {
    const filtered = tasks.filter(t => {
      if (state.filter === 'open' && t.done) return false;
      if (state.filter === 'done' && !t.done) return false;
      if (state.search && !t.text.includes(state.search)) return false;
      return true;
    });
    if (filtered.length === 0 && state.search) continue;
    const catDone = tasks.filter(t => t.done).length;
    const catPct = tasks.length > 0 ? Math.round(catDone / tasks.length * 100) : 0;
    const isCol = state.collapsed[cat];
    const safeCat = cat.replace(/'/g, "\\'");

    h += `<div class="category"><div class="cat-header" onclick="toggleCat('${safeCat}')">
    <div class="info">
      <span class="arrow" style="transform:rotate(${isCol ? '-90' : '0'}deg)">&#9662;</span>
      <span style="width:3px;height:18px;border-radius:2px;background:${color};display:inline-block"></span>
      <span class="name">${escapeHtml(cat)}</span>
      <span class="count">${catDone}/${tasks.length}</span>
    </div>
    <div class="cat-progress"><div class="cat-bar"><div class="cat-fill" style="width:${catPct}%;background:${color}"></div></div><span class="cat-pct">${catPct}%</span></div>
    </div>`;
    if (!isCol) {
      h += `<div class="task-list">`;
      for (let t of filtered) {
        h += `<div class="task">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
        <span class="task-text ${t.done ? 'done' : ''}">${escapeHtml(t.text)}`;
        if (t.v) h += ` <span class="badge badge-green">Verified</span>`;
        if (t.n) h += ` <span class="badge badge-orange">${escapeHtml(t.n)}</span>`;
        h += `</span></div>`;
      }
      if (filtered.length === 0) h += `<p style="color:var(--text-muted);font-size:12px;padding:8px 0">No tasks</p>`;
      h += `</div>`;
    }
    h += `</div>`;
  }

  h += `<div class="footer">
    Manager Dashboard &middot; ${new Date().toLocaleDateString('he-IL')}
    <br><a href="#" onclick="resetConfig()">Settings</a>
  </div>`;
  app.innerHTML = h;
}

// ============ ACTIONS ============
function saveSetup() {
  const databaseURL = document.getElementById('cfg-dburl').value.trim();
  const apiKey = document.getElementById('cfg-apikey').value.trim();
  const projectId = document.getElementById('cfg-projectid').value.trim();
  const appId = document.getElementById('cfg-appid').value.trim();
  if (!databaseURL) return alert('Missing Database URL');
  config = { databaseURL, apiKey, projectId, appId };
  state.showSetup = false;
  saveConfig();
  initFirebase();
}

function importFromCurrentData() {
  if (!config || !config.databaseURL) return alert('Connect to Firebase first');
  if (!firebase.apps.length) initFirebase();
  const tasksToImport = {};
  for (const [cat, catData] of Object.entries(state.tasks)) {
    for (const t of catData.tasks) {
      tasksToImport[t.id] = {
        text: t.text, done: t.done, verified: t.v || false,
        note: t.n || '', est: t.est || 0, priority: t.priority || 9,
        category: cat
      };
    }
  }
  firebase.database().ref('tasks').set(tasksToImport)
    .then(() => { alert('Import successful!'); })
    .catch(e => { alert('Import failed: ' + e.message); });
}

function resetConfig() {
  state.showSetup = !state.showSetup;
  render();
}

function toggle(id) {
  for (let cat of Object.values(state.tasks)) {
    for (let t of cat.tasks) {
      if (t.id === id) {
        t.done = !t.done;
        render(); // Optimistic UI
        updateTaskInFirebase(id, { done: t.done });
        return;
      }
    }
  }
}

function setFilter(f) { state.filter = f; render(); }
function setSearch(v) { state.search = v; render(); }
function toggleCat(c) { state.collapsed[c] = !state.collapsed[c]; render(); }
function toggleHoursForm() { state.showHoursForm = !state.showHoursForm; render(); }
function addHours() {
  const d = document.getElementById('h-date').value;
  const hrs = document.getElementById('h-hours').value;
  const loc = document.getElementById('h-loc').value;
  const notes = document.getElementById('h-notes').value;
  if (!hrs) return;
  state.hours.push({ id: Date.now(), date: d, hours: hrs, location: loc, notes });
  state.showHoursForm = false; saveHours(); render();
}
function delHours(id) { state.hours = state.hours.filter(e => e.id !== id); saveHours(); render(); }

function toggleAddTask() { state.showAddTask = !state.showAddTask; render(); }
function addTask() {
  const text = document.getElementById('new-task-text').value.trim();
  if (!text) return alert('הכנס תיאור למשימה');
  const catSelect = document.getElementById('new-task-cat');
  let cat = catSelect.value;
  if (cat === '__custom__') {
    cat = document.getElementById('new-task-custom-cat').value.trim();
    if (!cat) return alert('הכנס שם קטגוריה');
  }
  if (!db) return alert('Firebase not connected');
  const id = Date.now();
  const taskData = { text, done: false, verified: false, note: '', est: 0, priority: 9, category: cat };
  db.ref('tasks/' + id).set(taskData)
    .then(() => { state.showAddTask = false; })
    .catch(e => { alert('שגיאה: ' + e.message); });
}

// ============ INIT ============
loadConfig();
loadHours();
if (config && config.databaseURL) {
  render();
  initFirebase();
} else {
  render();
}
</script>
</body>
</html>
